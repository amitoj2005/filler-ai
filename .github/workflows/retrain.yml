name: Retrain model

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC nightly
  workflow_dispatch:        # manual trigger from Actions UI

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need push access — use the default GITHUB_TOKEN
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: training/requirements.txt

      - name: Install Python deps
        run: pip install -r training/requirements.txt

      - name: Train (skip if < 20 new human games)
        id: train
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONIOENCODING: utf-8
        run: |
          python training/train.py --include-human-games --min-new-games 20
          echo "trained=true" >> "$GITHUB_OUTPUT"

      - name: Export ONNX
        if: steps.train.outputs.trained == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONIOENCODING: utf-8
        run: python training/export_onnx.py

      - name: Commit and push new model
        if: steps.train.outputs.trained == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Count total games for the commit message
          GAME_COUNT=$(python - <<'EOF'
          import os, psycopg2
          conn = psycopg2.connect(os.environ["DATABASE_URL"])
          cur = conn.cursor()
          cur.execute("SELECT COUNT(*) FROM games WHERE completed_at IS NOT NULL AND anonymous_user_id != 'selfplay'")
          print(cur.fetchone()[0])
          conn.close()
          EOF
          )
          git add lib/ai/model.onnx
          git diff --cached --quiet && echo "No model change — skipping commit" && exit 0
          git commit -m "model: auto-retrain on ${GAME_COUNT} human games [skip ci]"
          git push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONIOENCODING: utf-8
