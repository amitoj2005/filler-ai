name: Weekly model retrain

on:
  schedule:
    - cron: '0 3 * * *'     # daily at 3am UTC    — threshold: 20 games (nightly catch-all)
    - cron: '0 */3 * * *'   # every 3 hours        — threshold: 50 games (early trigger)
  workflow_dispatch:        # also triggerable manually from the GitHub UI

permissions:
  contents: write           # needed to push updated model.onnx back to the repo

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: training/requirements.txt

      - name: Install Python dependencies
        run: pip install -r training/requirements.txt

      - name: Train model
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        # every-3h run: retrain only if ≥50 human games (exits in seconds otherwise)
        # 3am run: retrain if ≥20 human games (nightly catch-all)
        # manual dispatch: uses the lower 20-game threshold
        run: |
          if [ "${{ github.event.schedule }}" = "0 */3 * * *" ]; then
            python training/train.py --include-human-games --min-new-games 50
          else
            python training/train.py --include-human-games --min-new-games 20
          fi

      - name: Commit updated model
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/ai/model.onnx
          if git diff --cached --quiet; then
            echo "model.onnx unchanged (skipped or identical) — nothing to commit"
          else
            git commit -m "chore: auto-retrain model [$(date -u '+%Y-%m-%d')]"
            git push
          fi
