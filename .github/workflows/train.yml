name: Weekly model retrain

on:
  schedule:
    - cron: '0 3 * * *'   # every day at 3am UTC
  workflow_dispatch:        # also triggerable manually from the GitHub UI

permissions:
  contents: write           # needed to push updated model.onnx back to the repo

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: training/requirements.txt

      - name: Install Python dependencies
        run: pip install -r training/requirements.txt

      - name: Train model
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        # --include-human-games  : train on all completed games, not just self-play
        # --min-new-games 20     : skip the run if fewer than 20 human games exist
        run: python training/train.py --include-human-games --min-new-games 20

      - name: Commit updated model
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/ai/model.onnx
          if git diff --cached --quiet; then
            echo "model.onnx unchanged (skipped or identical) — nothing to commit"
          else
            git commit -m "chore: auto-retrain model [$(date -u '+%Y-%m-%d')]"
            git push
          fi
